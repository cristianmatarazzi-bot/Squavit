<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rete dei Referenti – Umbria</title>
  <meta name="description" content="Anagrafe dei referenti politici per le campagne elettorali di Marco Squarta e Simona Vitali in Umbria." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #FBFAF4; }
    #root { min-height: 100vh; }
    /* spinner iniziale */
    #splash { position:fixed; inset:0; background:#1E3257; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; transition:opacity .4s; }
    #splash.hidden { opacity:0; pointer-events:none; }
    #splash p { color:#F0CE56; font-family:sans-serif; font-size:15px; letter-spacing:.1em; text-transform:uppercase; margin-top:16px; }
    .spin { width:42px; height:42px; border:4px solid rgba(240,206,86,.3); border-top-color:#F0CE56; border-radius:50%; animation:spin .9s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div id="splash">
    <div class="spin"></div>
    <p>Caricamento…</p>
  </div>
  <div id="root"></div>
  <script>
    window.addEventListener("DOMContentLoaded", () => {
      setTimeout(() => {
        const s = document.getElementById("splash");
        if (s) s.classList.add("hidden");
      }, 1800);
    });
  </script>

@import url('https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,600&family=Spectral:wght@600;700&display=swap');

:root {
  --blu: #2F4B7C; --blu-scuro: #1E3257; --blu-tenue: #E7EDF7; --blu-bordo: #C8D4E8;
  --giallo: #F2DE9B; --giallo-vivo: #F0CE56; --giallo-tenue: #FBF4DC; --giallo-scuro: #B8932E;
  --carta: #FBFAF4; --inchiostro: #25304A; --grigio: #6B7690;
}
* { box-sizing: border-box; margin: 0; }
.app { min-height: 100vh; background: var(--carta); font-family: 'Archivo', sans-serif; color: var(--inchiostro); }

/* testata */
.testata { background: radial-gradient(120% 160% at 85% 0%, #3D5E99 0%, var(--blu) 45%, var(--blu-scuro) 100%); color: #fff; position: relative; overflow: hidden; }
.testata::after { content:""; position:absolute; inset:0; background-image: radial-gradient(rgba(255,255,255,.07) 1px, transparent 1px); background-size: 22px 22px; pointer-events:none; }
.testata-banda { height: 7px; background: repeating-linear-gradient(90deg, var(--giallo-vivo) 0 46px, #fff 46px 50px, var(--blu) 50px 54px); position: relative; z-index:1; }
.testata-int { max-width: 1100px; margin: 0 auto; padding: 30px 20px 28px; display: flex; flex-wrap: wrap; gap: 24px; justify-content: space-between; align-items: flex-start; position: relative; z-index:1; }
.eyebrow { font-size: 11px; letter-spacing: .22em; text-transform: uppercase; color: var(--giallo-vivo); font-weight: 700; margin-bottom: 8px; }
h1 { font-family: 'Archivo', sans-serif; font-size: clamp(28px, 4.6vw, 46px); font-weight: 900; letter-spacing: .04em; line-height: 1; text-shadow: 0 3px 0 rgba(0,0,0,.18); }
h1::after { content:""; display:block; width: 92px; height: 5px; background: var(--giallo-vivo); border-radius: 3px; margin-top: 10px; }
.sotto { margin-top: 12px; font-size: 14.5px; color: #D7E0F0; max-width: 520px; }
.sotto strong { color: #fff; }
.kpi { display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
.kpi-box { background: rgba(255,255,255,.09); border: 1px solid rgba(255,255,255,.2); border-radius: 12px; padding: 10px 18px; text-align: center; min-width: 92px; backdrop-filter: blur(2px); }
.kpi-n { font-size: 26px; font-weight: 800; display: block; }
.kpi-su { font-size: 13px; font-weight: 500; opacity: .7; }
.kpi-l { font-size: 10.5px; letter-spacing: .06em; text-transform: uppercase; color: #C9D5EA; }

/* candidati */
.candidati { display: flex; gap: 18px; align-items: flex-start; }
.candidato { display: flex; flex-direction: column; align-items: center; gap: 7px; }
.candidato img { width: 92px; height: 92px; border-radius: 50%; object-fit: cover; border: 3.5px solid var(--giallo-vivo); box-shadow: 0 6px 18px rgba(0,0,0,.35); }
.candidato span { font-size: 12px; font-weight: 700; text-align: center; line-height: 1.25; letter-spacing: .03em; text-transform: uppercase; color: #EDF2FB; }

/* layout */
.contenuto { max-width: 1100px; margin: 0 auto; padding: 24px 20px 40px; display: flex; flex-direction: column; gap: 20px; }
.pannello { background: #fff; border: 1px solid var(--blu-bordo); border-radius: 16px; padding: 22px; box-shadow: 0 3px 14px rgba(47,75,124,.08); }
.pannello-testa { display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; align-items: center; margin-bottom: 14px; }
h2 { font-family: 'Spectral', serif; font-size: 21px; color: var(--blu-scuro); }
.badge-conteggio { background: var(--giallo-tenue); border: 1px solid var(--giallo); color: var(--giallo-scuro); border-radius: 999px; font-size: 12px; font-family: 'Archivo'; font-weight: 700; padding: 2px 10px; vertical-align: 3px; margin-left: 6px; }

/* form */
.griglia-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 12px; }
.campo { display: flex; flex-direction: column; gap: 4px; }
.campo-largo { grid-column: 1 / -1; }
label { font-size: 11.5px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--grigio); }
input, textarea { font-family: 'Archivo'; font-size: 14px; padding: 9px 11px; border: 1px solid var(--blu-bordo); border-radius: 9px; background: var(--blu-tenue); color: var(--inchiostro); outline: none; transition: border .15s, background .15s, box-shadow .15s; }
input:focus, textarea:focus { border-color: var(--blu); background: #fff; box-shadow: 0 0 0 3px rgba(47,75,124,.13); }
textarea { resize: vertical; }
.aff-box { background: var(--blu-tenue); border: 1px solid var(--blu-bordo); border-radius: 9px; padding: 9px 11px; min-height: 39px; display: flex; align-items: center; }

/* pallini affidabilit\xE0 */
.pallini { display: inline-flex; align-items: center; gap: 4px; }
.pallini span:not(.pallini-label) { display: inline-block; border-radius: 50%; border: 1.8px solid; transition: transform .1s; }
.pallini-int span:not(.pallini-label) { cursor: pointer; }
.pallini-int span:not(.pallini-label):hover { transform: scale(1.25); }
.pallini-label { font-size: 12px; color: var(--grigio); margin-left: 6px; font-weight: 600; text-transform: none; letter-spacing: 0; }

.azioni-form { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 18px; }
button { font-family: 'Archivo'; font-weight: 700; font-size: 13.5px; border: none; border-radius: 10px; padding: 11px 19px; cursor: pointer; transition: transform .1s, box-shadow .15s, background .15s; }
button:focus-visible { outline: 3px solid var(--giallo-vivo); outline-offset: 2px; }
button:active { transform: translateY(1px); }
.btn-primario { background: var(--blu); color: #fff; box-shadow: 0 3px 0 var(--blu-scuro); }
.btn-primario:hover { background: #3A5A94; }
.btn-giallo { background: var(--giallo-vivo); color: #4E3E0B; box-shadow: 0 3px 0 #C9A93B; }
.btn-giallo:hover { background: #F4D76E; }
.btn-secondario { background: #fff; color: var(--blu); border: 1.5px solid var(--blu); }
.btn-secondario:hover { background: var(--blu-tenue); }
.btn-secondario:disabled { opacity: .4; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--grigio); border: 1px dashed var(--blu-bordo); padding: 6px 12px; font-size: 12px; }
.nota-salvataggio { font-size: 12.5px; color: #3FA565; font-weight: 700; }

.banner { margin-top: 12px; border-radius: 10px; padding: 11px 14px; font-size: 13.5px; font-weight: 500; }
.banner.ok { background: #EAF6EE; border: 1px solid #BBDFC8; color: #2E6B45; }
.banner.warn { background: var(--giallo-tenue); border: 1px solid var(--giallo); color: #7A6217; }
.banner.err { background: #FBEAEA; border: 1px solid #EDC1C1; color: #93393B; }

/* tabella */
.ricerca { min-width: 240px; }
.tabella-scroll { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
th { text-align: left; font-size: 11px; letter-spacing: .06em; text-transform: uppercase; color: var(--grigio); padding: 8px 10px; border-bottom: 2px solid var(--blu-tenue); }
th.num, td.num { text-align: right; }
td { padding: 10px; border-bottom: 1px solid #EEF1F7; vertical-align: top; }
tr:hover td { background: #FAFBFE; }
.riga-dup td { background: #FFF7E0; }
.tag-dup { background: #E15B5B; color: #fff; font-size: 9.5px; font-weight: 800; letter-spacing: .06em; border-radius: 4px; padding: 2px 6px; margin-left: 8px; vertical-align: 1px; }
.td-contatti .email { color: var(--grigio); font-size: 12.5px; }
.td-note { max-width: 200px; color: var(--grigio); font-size: 12.5px; }
.pillola-voti { background: var(--blu-tenue); border: 1px solid var(--blu-bordo); color: var(--blu-scuro); font-weight: 700; border-radius: 999px; padding: 2px 10px; }
.td-azioni { white-space: nowrap; }
.btn-mini { background: var(--blu-tenue); color: var(--blu); padding: 5px 9px; border-radius: 7px; margin-left: 4px; font-size: 13px; box-shadow: none; }
.btn-mini.rosso { background: #FBEAEA; color: #B14040; }
.vuoto { color: var(--grigio); font-size: 14px; padding: 18px 4px; }
.pie { font-size: 11.5px; color: var(--grigio); text-align: center; }

/* modale mappa */
.overlay { position: fixed; inset: 0; background: rgba(30,50,87,.6); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50; }
.modale { background: var(--carta); border-radius: 18px; max-width: 960px; width: 100%; max-height: 93vh; overflow-y: auto; box-shadow: 0 20px 70px rgba(0,0,0,.35); border-top: 6px solid var(--giallo-vivo); }
.modale-testa { display: flex; justify-content: space-between; align-items: flex-start; padding: 20px 22px 8px; position: sticky; top: 0; background: var(--carta); z-index: 2; }
.modale-sotto { font-size: 13px; color: var(--grigio); margin-top: 4px; max-width: 540px; }
.btn-chiudi { background: var(--blu-tenue); color: var(--blu); border-radius: 50%; width: 36px; height: 36px; padding: 0; font-size: 15px; flex-shrink: 0; }
.modale-corpo { display: grid; grid-template-columns: 1.15fr 1fr; gap: 20px; padding: 8px 22px 24px; }
@media (max-width: 760px) { .modale-corpo { grid-template-columns: 1fr; } }
.mappa-svg { width: 100%; height: auto; filter: drop-shadow(0 6px 14px rgba(47,75,124,.22)); }
.zona { cursor: pointer; transition: filter .12s; }
.zona:hover { filter: brightness(1.12); }
.legenda { display: flex; align-items: center; gap: 10px; font-size: 11.5px; color: var(--grigio); margin-top: 10px; justify-content: center; }
.legenda-scala { width: 170px; height: 11px; border-radius: 999px; background: linear-gradient(90deg, #E8625F, #EDC94F, #3FA565); border: 1px solid rgba(0,0,0,.08); }

.zone-col { display: flex; flex-direction: column; gap: 7px; }
.info-comune { background: var(--blu); color: #fff; border-radius: 13px; padding: 14px 16px; min-height: 92px; display: flex; flex-direction: column; gap: 3px; box-shadow: 0 4px 12px rgba(47,75,124,.3); }
.info-comune strong { font-size: 18px; font-weight: 800; }
.info-zona { font-size: 11.5px; color: var(--giallo-vivo); text-transform: uppercase; letter-spacing: .08em; font-weight: 700; }
.info-numeri { display: flex; gap: 22px; margin-top: 6px; }
.info-numeri b { font-size: 22px; display: block; }
.info-numeri small { font-size: 10.5px; text-transform: uppercase; letter-spacing: .05em; color: #C9D5EA; }
.info-vuota { color: #C9D5EA; font-size: 13px; margin: auto 0; }
.sezione-titolo { font-size: 11px; letter-spacing: .14em; text-transform: uppercase; font-weight: 800; color: var(--grigio); margin-top: 8px; }
.zona-riga { display: flex; gap: 10px; align-items: center; background: #fff; border: 1px solid var(--blu-bordo); border-radius: 10px; padding: 8px 12px; }
.zona-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; border: 1px solid rgba(0,0,0,.12); }
.zona-info { display: flex; flex-direction: column; font-size: 13px; }
.zona-sub { font-size: 11.5px; color: var(--grigio); }
.top-comuni { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { font-size: 11.5px; background: #F2F4F9; border: 1px solid #E2E7F0; color: var(--grigio); border-radius: 999px; padding: 3px 10px; }
.chip-ok { background: var(--giallo-tenue); border-color: var(--giallo); color: #6E5A18; font-weight: 700; cursor: pointer; }
.chip-ok:hover { background: var(--giallo); }

.bandiera-bg { position:absolute; inset:0; top:7px; z-index:0; pointer-events:none; overflow:hidden; }
.bandiera-bg svg { width:100%; height:100%; }
.candidato img { display:none; }
.candidato-cerchio { width:96px; height:96px; border-radius:50%; border:3.5px solid var(--giallo-vivo); box-shadow:0 6px 22px rgba(0,0,0,.4), 0 0 0 5px rgba(240,206,86,.22); overflow:hidden; position:relative; background:#1E3257; }
.candidato-cerchio img { display:block; width:100%; height:100%; object-fit:cover; object-position:center top; }
